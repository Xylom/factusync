<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>FactuSync Mobile</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="FactuSync.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app" class="loading-container">
        <div class="loading-header">
            <!-- Modern Animated Sync Icon as Logo -->
            <img src="images/logo_icon.png" class="loading-logo" style="width: 80px; height: 80px; border-radius: 20px; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1);" />
            <h2 class="loading-title">FactuSync</h2>
            <p class="loading-subtitle">Preparando tu entorno móvil...</p>
        </div>

        <div class="loading-progress-bar-wrapper">
            <div class="loading-progress-bar"></div>
        </div>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
</body>

</html>
